<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora - LandApp</title>
  <link rel="stylesheet" href="embed_overrides.css" />
  <style>
    /* wrapper com cara de "dashboard" dentro da plataforma */
    .calc-shell{
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }
    .calc-header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 14px;
    }
    .calc-title{
      margin:0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .2px;
      color: var(--text);
    }
    .calc-sub{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .calc-tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .tab-btn{
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 700;
      display:flex;
      align-items:center;
      gap:8px;
      transition: transform .15s ease, filter .15s ease, background .15s ease;
      user-select:none;
      white-space: nowrap;
    }
    .tab-btn:hover{ filter: brightness(1.06); transform: translateY(-1px); }
    .tab-btn.active{
      background: linear-gradient(180deg, var(--land-orange), #d84a00);
      border-color: rgba(241,85,0,.55);
      box-shadow: 0 12px 26px rgba(241,85,0,.18);
    }

    .calc-frame-wrap{
      border: 1px solid var(--stroke);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(255,255,255,.03);
      box-shadow: 0 18px 55px rgba(2,6,23,.30);
      height: calc(100vh - 150px);
      min-height: 640px;
    }
    .calc-frame{
      width:100%;
      height:100%;
      border:0;
      background: transparent;
    }

    @media (max-width: 820px){
      .calc-shell{ padding: 12px; }
      .calc-frame-wrap{ height: calc(100vh - 190px); min-height: 560px; }
    }
  </style>
</head>
<body>
  <div class="calc-shell">
    <div class="calc-header">
      <div>
        <h1 class="calc-title">Calculadora</h1>
        <p class="calc-sub">Consulta Simples + Consulta Detalhada (mesmas funções do Land_Calc, só que vestida pra Plataforma 😌)</p>
      </div>

      <div class="calc-tabs" role="tablist" aria-label="Tipo de consulta">
        <div class="tab-btn" id="tabSimples" role="tab" aria-selected="false" tabindex="0">🧭 Consulta Simples</div>
        <div class="tab-btn active" id="tabDetalhada" role="tab" aria-selected="true" tabindex="0">🧠 Consulta Detalhada</div>
      </div>
    </div>

    <div class="calc-frame-wrap">
      <iframe class="calc-frame" id="calcFrame" title="Calculadora LandApp" src="Consulta_Detalhada/index.html" loading="lazy" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const frame = document.getElementById('calcFrame');
    const tabSimples = document.getElementById('tabSimples');
    const tabDetalhada = document.getElementById('tabDetalhada');

    function setActive(which){
      const isSimples = which === 'simples';
      tabSimples.classList.toggle('active', isSimples);
      tabDetalhada.classList.toggle('active', !isSimples);
      tabSimples.setAttribute('aria-selected', String(isSimples));
      tabDetalhada.setAttribute('aria-selected', String(!isSimples));
      const version = `v=${Date.now()}`;
      frame.src = isSimples ? `Consulta_Simples/index.html?${version}` : `Consulta_Detalhada/index.html?${version}`;
    }

    tabSimples.addEventListener('click', () => setActive('simples'));
    tabDetalhada.addEventListener('click', () => setActive('detalhada'));

    // padrão: abrir direto na consulta detalhada
    setActive('detalhada');

    // teclado (enter / espaço)
    ;[tabSimples, tabDetalhada].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          el.click();
        }
      });
    });
  </script>
</body>
</html>
